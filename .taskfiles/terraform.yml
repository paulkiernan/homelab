---
version: "3"

vars:
  TERRAFORM_DIR: "{{.ROOT_DIR}}/terraform"

x-tf-encryption: &tf-encryption
  TF_ENCRYPTION:
    sh: |
      PASSPHRASE=$(sops -d --extract '["state_passphrase"]' state-encryption.sops.yaml)
      cat <<EOF
      key_provider "pbkdf2" "key" {
        passphrase = "${PASSPHRASE}"
      }
      method "aes_gcm" "method" {
        keys = key_provider.pbkdf2.key
      }
      state {
        method   = method.aes_gcm.method
        enforced = true
      }
      EOF

tasks:
  init:
    desc: Initialize OpenTofu
    dir: "{{.TERRAFORM_DIR}}"
    cmds:
      - tofu init

  plan:
    desc: Plan OpenTofu changes
    dir: "{{.TERRAFORM_DIR}}"
    env: *tf-encryption
    cmds:
      - tofu plan

  apply:
    desc: Apply OpenTofu changes
    dir: "{{.TERRAFORM_DIR}}"
    env: *tf-encryption
    cmds:
      - tofu apply
