---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:

  age-keygen:
    desc: Initialize Age Key for Sops
    cmd: age-keygen --output {{.AGE_FILE}}
    status: ["test -f {{.AGE_FILE}}"]

  check:
    desc: Verify all SOPS files are encrypted
    cmds:
      - |
        failed=0
        for file in $(find "{{.KUBERNETES_DIR}}" "{{.ROOT_DIR}}/terraform" -type f -name '*.sops.*' 2>/dev/null); do
          if ! grep -q "ENC\[AES256_GCM" "$file"; then
            echo "ERROR: SOPS file is not encrypted: ${file}"
            failed=1
          fi
        done
        if [ "$failed" -eq 1 ]; then
          echo "Unencrypted SOPS files detected. Run 'task sops:encrypt' before committing."
          exit 1
        fi
        echo "All SOPS files are properly encrypted."

  encrypt:
    desc: Encrypt all SOPS secrets (kubernetes/ and terraform/)
    cmds:
      - for: { var: file }
        task: .encrypt-file
        vars:
          file: "{{.ITEM}}"
    vars:
      file:
        sh: find "{{.KUBERNETES_DIR}}" "{{.ROOT_DIR}}/terraform" -type f -name "*.sops.*" -exec grep -L "ENC\[AES256_GCM" {} \;

  .encrypt-file:
    internal: true
    cmd: sops --encrypt --in-place {{.file}}
    requires:
      vars: ["file"]
    preconditions:
      - msg: Missing Sops config file
        sh: test -f {{.SOPS_CONFIG_FILE}}
      - msg: Missing Sops Age key file
        sh: test -f {{.AGE_FILE}}

  re-encrypt:
    desc: Re-encrypt all sops files (e.g., after rotating keys or changing encryption config)
    cmds:
      - for: { var: file }
        task: .re-encrypt-file
        vars:
          file: "{{.ITEM}}"
    vars:
      file:
        sh: find . -mindepth 2 -type f -name '*.sops.*'

  .re-encrypt-file:
    internal: true
    cmd: sops updatekeys {{.file}}
    requires:
      vars: ["file"]
    preconditions:
      - msg: Missing Sops config file
        sh: test -f {{.SOPS_CONFIG_FILE}}
      - msg: Missing Sops Age key file
        sh: test -f {{.AGE_FILE}}

  .reset:
    internal: true
    cmd: rm -rf {{.SOPS_CONFIG_FILE}}
