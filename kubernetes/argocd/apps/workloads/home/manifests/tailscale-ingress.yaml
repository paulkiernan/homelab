---
# Claims the `home` Tailscale hostname -> https://home.border-enigmatic.ts.net/
# NOTE: the existing gethomepage app also claims hostname "home". At cutover,
# change or remove that one (see deploy/homelab/CUTOVER.md) so this service owns
# the hostname.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-tailscale
  namespace: home
  annotations:
    tailscale.com/hostname: "home"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: home
      port:
        number: 80
  tls:
    - hosts:
        - home
