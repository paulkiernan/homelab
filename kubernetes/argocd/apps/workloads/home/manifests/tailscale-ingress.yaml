---
# Private access on the Tailnet: https://home.border-enigmatic.ts.net/
# Claims the `home` Tailscale hostname (taken over from the old gethomepage app,
# which now lives at `homelab`).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-tailscale
  namespace: home
  annotations:
    tailscale.com/hostname: "home"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: home
      port:
        number: 80
  tls:
    - hosts:
        - home
