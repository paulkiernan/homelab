# Coastal conditions config.
# One or more surf spots and one or more fishing/diving spots, each rendered as a
# panel. If ndbc_buoy or tide_station are blank (""), the nearest active station
# is looked up from lat/lon at startup and logged.

timezone: "America/Los_Angeles"   # used for solunar / sun-moon display times

surf_spots:
  # Beginner-friendly SF-area breaks. offshore_wind_bearing_deg = the wind
  # direction that blows offshore (clean) for that beach; tune to taste.
  - name: "Linda Mar (Pacifica)"
    lat: 37.5930
    lon: -122.5050
    ndbc_buoy: "46026"        # San Francisco offshore wave buoy
    tide_station: "9414131"   # Pillar Point Harbor, Half Moon Bay
    offshore_wind_bearing_deg: 90   # wind FROM ~E = offshore/clean here
  - name: "Bolinas (Marin)"
    lat: 37.8907
    lon: -122.6892
    ndbc_buoy: "46214"        # Point Reyes offshore wave buoy
    tide_station: "9414958"   # Bolinas Lagoon
    offshore_wind_bearing_deg: 30   # south-facing, tucked behind the point; offshore ~NNE
  - name: "Half Moon Bay (Francis Beach)"
    lat: 37.4636
    lon: -122.4453
    ndbc_buoy: "46012"        # Half Moon Bay offshore wave buoy
    tide_station: "9414131"   # Pillar Point Harbor, Half Moon Bay
    offshore_wind_bearing_deg: 85   # west-facing beach break; offshore ~E

fishing_spots:
  - name: "Ocean Beach (SF)"
    lat: 37.7594
    lon: -122.5107
    ndbc_buoy: "46026"        # San Francisco offshore wave buoy
    tide_station: "9414275"   # Ocean Beach, outer coast
  - name: "Timber Cove (Sonoma)"
    lat: 38.5366
    lon: -123.0247
    ndbc_buoy: "46013"        # Bodega Bay offshore wave buoy
    tide_station: "9416024"   # Fort Ross

refresh_minutes: 30

# Barometric trend window (hours) used for the fishing pressure signal.
pressure_trend_hours: 9

# Scoring weights (0..1 within each panel; normalized internally).
scoring:
  # Surf is scored for BEGINNER-friendliness: small, clean, manageable = good;
  # too big or flat = bad. Sizes are swell height in feet.
  surf:
    size: 0.45          # how close to the learner sweet-spot
    offshore: 0.25      # offshore/clean wind direction
    wind_strength: 0.20 # light wind
    gustiness: 0.10     # steady (not gusty/choppy)
    flat_ft: 1.0        # below this = too small to ride
    ideal_lo_ft: 2.0    # learner sweet-spot starts
    ideal_hi_ft: 3.5    # learner sweet-spot ends
    big_ft: 5.0         # above this = too big for beginners
    max_ft: 7.0         # well overhead, score 0
    wind_calm_kt: 5
    wind_strong_kt: 18
    offshore_tolerance_deg: 45
  fishing:
    swell_viz: 0.40
    wind: 0.25
    pressure: 0.20
    solunar: 0.15
    swell_calm_m: 0.5
    swell_rough_m: 2.5
    wind_calm_kt: 5
    wind_strong_kt: 18

# Solunar window half-widths (minutes).
solunar:
  major_halfwidth_min: 60
  minor_halfwidth_min: 30
