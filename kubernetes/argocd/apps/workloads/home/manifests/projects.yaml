# Curated links shown on the homepage. Add a new project here and it shows up on
# the next page refresh (the backend reads this file per request). In the cluster
# this is mounted as a ConfigMap; edit + git push and ArgoCD syncs it.
#
# Helper:  python scripts/update_projects.py   # scans ~/workspace + GitHub and
#                                               # prints entries you can paste below.
#
# Each item: name, href, description, icon (emoji or text), external (opens new tab)

