---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home
  namespace: home
  labels:
    app: home
spec:
  replicas: 2
  selector:
    matchLabels:
      app: home
  template:
    metadata:
      labels:
        app: home
    spec:
      containers:
        - name: home
          # Bump tag to the version published by .github/workflows/docker-publish.yml
          image: ghcr.io/paulkiernan/coastal-conditions:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: /app/config/config.yaml
            - name: PROJECTS_PATH
              value: /app/config/projects.yaml
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: home-config
