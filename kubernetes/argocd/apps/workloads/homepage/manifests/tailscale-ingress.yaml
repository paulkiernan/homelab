---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage-tailscale
  namespace: homepage
  annotations:
    # Cutover: the `home` hostname now belongs to the custom `home` dashboard
    # workload (apps/workloads/home). gethomepage moves to `homelab`.
    tailscale.com/hostname: "homelab"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: homepage
      port:
        number: 3000
  tls:
    - hosts:
        - homelab
